name: Daily Tutor Run

on:
  schedule:
    # 06:30 America/Sao_Paulo = 09:30 UTC
    - cron: '30 9 * * *'
  workflow_dispatch:  # permite rodar manualmente

jobs:
  run-tutor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run orchestrator
        env:
          POE_API_KEY: ${{ secrets.POE_API_KEY }}
          POE_BOT_NAME: ${{ vars.POE_BOT_NAME || 'DSM5-ABP-Tutor' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # Pode ficar vazio para auto-discovery
          SUPABASE_USER_ID: ${{ secrets.SUPABASE_USER_ID }}
          EXAM_DATE: ${{ vars.EXAM_DATE || '2026-05-30' }}
          START_DATE: ${{ vars.START_DATE || '2026-05-01' }}
          TIMEZONE: America/Sao_Paulo
          LOG_LEVEL: INFO
        run: python -m abp_tutor.orchestrator
